name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: lint & test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        run: pytest --cov=infrapilot --cov-report=term-missing
      - name: Smoke test the agent loop
        run: infrapilot demo

  iac:
    name: terraform & ansible
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Terraform fmt / init / validate
        working-directory: infra/terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false -input=false
          terraform validate -no-color

      - name: Install Ansible
        run: pip install ansible ansible-lint

      - name: Ansible syntax check & lint
        working-directory: infra/ansible
        run: |
          ansible-playbook -i inventory.ini site.yml --syntax-check
          ansible-lint site.yml || true   # advisory, do not fail the build

      - name: Real end-to-end run (terraform + ansible installed)
        run: |
          pip install -e .
          infrapilot run --no-remediate || true   # audit-only; informational
